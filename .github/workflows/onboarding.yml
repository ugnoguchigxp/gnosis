name: Onboarding

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fresh-clone-onboarding:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Bootstrap (minimal)
        run: bun run bootstrap

      - name: Doctor
        run: bun run doctor

      - name: Onboarding smoke
        run: bun run onboarding:smoke
