id: segment-lint-typescript
event: task.completed
enabled: true
priority: 100

conditions:
  project_type: typescript
  changed_files_min: 1
  changed_lines_min: 10

actions:
  - type: run_command
    command: bun run lint
    timeout_sec: 120

  - type: run_command
    command: bun run typecheck
    timeout_sec: 180

  - type: emit_monitor_event
    include_output: true
    include_duration: true

on_failure:
  strategy: block_with_guidance
  guidance: |
    TypeScript の lint または typecheck に失敗しました。
    小さな区切りのうちに解消してから進んでください。
