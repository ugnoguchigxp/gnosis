id: task-completed-episode-candidate
event: task.completed
enabled: true
priority: 400

conditions:
  changed_files_min: 1

actions:
  - type: create_episode_candidate
    episode_kind: success
    include:
      - task_summary
      - changed_files
      - diff_summary
      - executed_checks
      - review_summary
      - risk_tags

  - type: emit_monitor_event
    include_summary: true
