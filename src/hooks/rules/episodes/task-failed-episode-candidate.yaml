id: task-failed-episode-candidate
event: task.failed
enabled: true
priority: 410

conditions:
  changed_files_min: 1

actions:
  - type: create_episode_candidate
    episode_kind: failure
    include:
      - failure_reason
      - last_command_results
      - changed_files
      - risk_tags
      - review_findings

  - type: create_lesson_candidate
    source: failure_episode

  - type: emit_monitor_event
    include_summary: true
    include_reason: true
