hooks:
  - id: review-gate-console-log-check
    event: task.ready_for_review
    enabled: true
    priority: 50

    conditions:
      changed_files_min: 1
      path_matches: 
        - "src/.*\\.(ts|tsx|js|jsx)$"

    actions:
      - type: run_command
        # grep で console.log を探し、見つかったら終了コード 1 を返す
        command: >-
          bash -lc 'files=();
          while IFS= read -r -d "" file; do
            if [[ "$file" =~ ^src/.*\.(ts|tsx|js|jsx)$ ]] && [[ -f "$file" ]]; then
              files+=("$file")
            fi
          done < <({ git diff --name-only -z HEAD; git ls-files --others --exclude-standard -z; });
          [ ${#files[@]} -eq 0 ] || ! grep -Hn "console\.log" "${files[@]}"'
        timeout_sec: 30

    on_failure:
      strategy: soft_warn
      guidance: |
        ソースコード内に `console.log` が検出されました。
        デバッグ用のログであれば削除してからレビューに進むことを推奨します。
