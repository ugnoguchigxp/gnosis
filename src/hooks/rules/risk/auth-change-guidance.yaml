id: auth-change-guidance
event: file.changed
enabled: true
priority: 50

conditions:
  path_matches:
    - src/auth/**
    - src/middleware/**
    - src/security/**

actions:
  - type: tag_risk
    risk_tag: auth-change

  - type: add_guidance
    guidance: |
      認証/認可まわりの変更を検知しました。
      以下を確認してください:
      - 認可漏れ
      - 権限昇格の抜け道
      - デフォルト許可になっていないか
      - セッション/トークン整合性
