id: db-change-guidance
event: file.changed
enabled: true
priority: 50

conditions:
  path_matches:
    - src/db/**
    - migrations/**
    - drizzle/**

actions:
  - type: tag_risk
    risk_tag: db-change

  - type: add_guidance
    guidance: |
      DB変更を検知しました。
      以下を確認してください:
      - 破壊的変更の有無
      - migration の後方互換性
      - 既存データへの影響
      - rollback 可否

  - type: emit_monitor_event
    include_reason: true
